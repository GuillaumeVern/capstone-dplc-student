apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "capstone-chart.fullname" . }}-capstone-db
  labels:
    workload.user.cattle.io/workloadselector: apps.deployment-capstone-capstone-db
  {{- include "capstone-chart.labels" . | nindent 4 }}
  annotations:
    deployment.kubernetes.io/revision: "7"
spec:
  replicas: {{ .Values.capstoneDbService.replicas }}
  revisionHistoryLimit: {{ .Values.capstoneDbService.revisionHistoryLimit }}
  strategy:
    rollingUpdate:
      maxSurge: {{ .Values.capstoneDbService.strategy.rollingUpdate.maxSurge | quote }}
      maxUnavailable: {{ .Values.capstoneDbService.strategy.rollingUpdate.maxUnavailable |
        quote }}
    type: {{ .Values.capstoneDbService.strategy.type | quote }}
  selector:
    matchLabels:
      workload.user.cattle.io/workloadselector: apps.deployment-capstone-capstone-db
    {{- include "capstone-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        workload.user.cattle.io/workloadselector: apps.deployment-capstone-capstone-db
      {{- include "capstone-chart.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - env:
        - name: POSTGRES_DB
          value: {{ quote .Values.capstoneDbService.postgres.env.postgresDb }}
        - name: POSTGRES_USER
          value: {{ quote .Values.capstoneDbService.postgres.env.postgresUser }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        envFrom:
        - secretRef:
            name: capstone-postgres-pass
            optional: false
        image: {{ .Values.capstoneDbService.postgres.image.repository }}:{{ .Values.capstoneDbService.postgres.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.capstoneDbService.postgres.imagePullPolicy }}
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: postgres
        ports:
        - containerPort: 5432
          name: postgres
          protocol: TCP
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          failureThreshold: 3
          initialDelaySeconds: 15
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources: {{- toYaml .Values.capstoneDbService.postgres.resources | nindent 10 }}
        securityContext: {{- toYaml .Values.capstoneDbService.postgres.containerSecurityContext
          | nindent 10 }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: vol-63nvv
        - mountPath: /docker-entrypoint-initdb.d
          name: vol-xehqv
      dnsPolicy: ClusterFirst
      nodeSelector: {{- toYaml .Values.capstoneDbService.nodeSelector | nindent 8 }}
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {{- toYaml .Values.capstoneDbService.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "capstone-chart.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30
      tolerations: {{- toYaml .Values.capstoneDbService.tolerations | nindent 8 }}
      topologySpreadConstraints: {{- toYaml .Values.capstoneDbService.topologySpreadConstraints
        | nindent 8 }}
      volumes:
      - name: vol-63nvv
        persistentVolumeClaim:
          claimName: postgres-pvc
      - configMap:
          defaultMode: 420
          name: podtgres-init-script
          optional: false
        name: vol-xehqv
