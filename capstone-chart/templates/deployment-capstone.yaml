apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "capstone-chart.fullname" . }}-capstone-deployment
  labels:
    workload.user.cattle.io/workloadselector: apps.deployment-capstone-capstone-deployment
  {{- include "capstone-chart.labels" . | nindent 4 }}
  annotations:
    deployment.kubernetes.io/revision: "30"
    field.cattle.io/publicEndpoints: '[{"addresses":["192.168.3.103"],"port":443,"protocol":"HTTPS","serviceName":"capstone:capstone-deployment-loadbalancer","ingressName":"capstone:capstone-ingress","hostname":"capstone.losvernos.com","path":"/","allNodes":false}]'
spec:
  replicas: {{ .Values.capstoneDeployment.replicas }}
  revisionHistoryLimit: {{ .Values.capstoneDeployment.revisionHistoryLimit }}
  strategy:
    rollingUpdate:
      maxSurge: {{ .Values.capstoneDeployment.strategy.rollingUpdate.maxSurge | quote
        }}
      maxUnavailable: {{ .Values.capstoneDeployment.strategy.rollingUpdate.maxUnavailable
        | quote }}
    type: {{ .Values.capstoneDeployment.strategy.type | quote }}
  selector:
    matchLabels:
      workload.user.cattle.io/workloadselector: apps.deployment-capstone-capstone-deployment
    {{- include "capstone-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        workload.user.cattle.io/workloadselector: apps.deployment-capstone-capstone-deployment
      {{- include "capstone-chart.selectorLabels" . | nindent 8 }}
      annotations:
        cattle.io/timestamp: "2026-06-30T10:28:52Z"
        kubectl.kubernetes.io/restartedAt: "2026-06-25T22:14:31+02:00"
    spec:
      containers:
      - env:
        - name: DB_NAME
          value: {{ quote .Values.capstoneDeployment.capstoneContainer.env.dbName }}
        - name: DB_USER
          value: {{ quote .Values.capstoneDeployment.capstoneContainer.env.dbUser }}
        - name: DB_HOST
          value: {{ quote .Values.capstoneDeployment.capstoneContainer.env.dbHost }}
        - name: DB_PORT
          value: {{ quote .Values.capstoneDeployment.capstoneContainer.env.dbPort }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        envFrom:
        - secretRef:
            name: capstone-db-pass
            optional: false
        image: {{ .Values.capstoneDeployment.capstoneContainer.image.repository }}:{{ .Values.capstoneDeployment.capstoneContainer.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.capstoneDeployment.capstoneContainer.imagePullPolicy
          }}
        lifecycle: {}
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
          successThreshold: 1
          timeoutSeconds: 5
        name: capstone-container
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/health/db
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        resources: {{- toYaml .Values.capstoneDeployment.capstoneContainer.resources |
          nindent 10 }}
        securityContext: {{- toYaml .Values.capstoneDeployment.capstoneContainer.containerSecurityContext
          | nindent 10 }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      nodeSelector: {{- toYaml .Values.capstoneDeployment.nodeSelector | nindent 8 }}
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {{- toYaml .Values.capstoneDeployment.podSecurityContext | nindent
        8 }}
      serviceAccountName: {{ include "capstone-chart.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30
      tolerations: {{- toYaml .Values.capstoneDeployment.tolerations | nindent 8 }}
      topologySpreadConstraints: {{- toYaml .Values.capstoneDeployment.topologySpreadConstraints
        | nindent 8 }}
